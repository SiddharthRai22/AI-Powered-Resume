# render.yaml — Render Blueprint for AI Resume Builder
# Docs: https://render.com/docs/blueprint-spec
#
# This file creates two services automatically when you connect
# this repo on Render via New → Blueprint:
#   1. ai-resume-backend  — Node.js Web Service
#   2. ai-resume-frontend — Static Site (Vite)

services:
  # ─── Backend: Node.js + Express ──────────────────────────────────────────────
  - type: web
    name: ai-resume-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    # Health-check so Render knows when the service is up
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        # Render generates a secure random value automatically
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GROQ_API_KEY
        # Set this manually in the Render dashboard — do NOT commit your key
        sync: false
      - key: FRONTEND_URL
        # Set this after the frontend deploys, e.g. https://ai-resume-frontend.onrender.com
        sync: false

  # ─── Frontend: React + Vite (Static Site) ────────────────────────────────────
  - type: web
    name: ai-resume-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # SPA fallback — all routes rewrite to index.html for React Router
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # Set this to your backend URL, e.g. https://ai-resume-backend.onrender.com
        sync: false
